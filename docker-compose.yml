version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: horizoncare-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: hospital_ai_assistant
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: horizoncare-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=hospital_ai_assistant
      - SECRET_KEY=hospital_ai_secret_key_2024_secure_random_string
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - GEMINI_API_KEY=your_gemini_api_key_here
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: horizoncare-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
